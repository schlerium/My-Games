<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mosquito Hunter</title>

    <!-- Mobile Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <!-- Favicon (prevents favicon.ico 404 error) -->
    <link rel="icon" href="icon-192.png" type="image/png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ROTATE SCREEN -->
<div id="rotateScreen">
    <img src="signal-2026-03-05-182622.png" alt="Rotate Device">
    <p>ROTATE DEVICE</p>
</div>

<!-- TOP UI BAR -->
<div id="topBar">
    <div class="leftUI">
        <span id="scoreDisplay">🦟 0</span>
        <span id="heartDisplay">❤️ 10</span>
    </div>

    <div class="rightUI">
        <button id="pauseBtn">❚❚</button>
        <button id="exitBtn">✕</button>
    </div>
</div>

<!-- WELCOME SCREEN -->
<div id="welcomeScreen">
    <div class="menuButtons">
        <button id="playBtn">PLAY</button>
        <button id="creditsBtn">CREDITS</button>
    </div>
</div>

<!-- PAUSE MENU -->
<div id="pauseMenu">
    <div class="pauseContent">
        <button id="resumeBtn">RESUME</button>
        <button id="pauseExitBtn">EXIT</button>
    </div>
</div>

<!-- CREDITS -->
<div id="creditsScreen">
    <p>Developer - Satyajit</p>
    <button id="backBtn">BACK</button>
</div>

<!-- GAME AREA -->
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
</div>

<script src="game.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
